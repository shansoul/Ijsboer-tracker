<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IJsboer Kaart - Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4ff;
      padding: 24px;
    }
    h1 {
      font-size: 1.2rem;
      color: #333;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 16px;
    }
    #ijsboer-map {
      height: 480px;
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    #status-banner {
      text-align: center;
      margin-top: 10px;
      font-size: 0.95rem;
      color: #555;
      min-height: 1.4em;
    }
  </style>
</head>
<body>
  <h1>🍦 Waar is de ijsboer?</h1>
  <p class="subtitle">Demo — pin beweegt automatisch in een cirkel</p>

  <div id="ijsboer-map"></div>
  <p id="status-banner"></p>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API_URL = "https://ijsboer-tracker-production.up.railway.app/api/location/test";
    const POLL_INTERVAL = 5000;

    const map = L.map("ijsboer-map").setView([52.3676, 4.9041], 15);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    const ijsjesIcon = L.divIcon({
      html: "🍦",
      className: "",
      iconSize: [32, 32],
      iconAnchor: [16, 16]
    });

    let marker = null;
    const statusEl = document.getElementById("status-banner");

    async function updateLocation() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        if (!data.is_active) {
          statusEl.textContent = "De ijsboer is vandaag nog niet onderweg.";
          if (marker) { marker.remove(); marker = null; }
          return;
        }

        const pos = [data.lat, data.lng];
        if (!marker) {
          marker = L.marker(pos, { icon: ijsjesIcon }).addTo(map);
        } else {
          marker.setLatLng(pos);
        }
        map.panTo(pos);
        statusEl.textContent = "";
      } catch {
        statusEl.textContent = "Locatie tijdelijk niet beschikbaar.";
      }
    }

    updateLocation();
    setInterval(updateLocation, POLL_INTERVAL);
  </script>
</body>
</html>
